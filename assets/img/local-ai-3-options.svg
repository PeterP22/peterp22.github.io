<svg viewBox="0 0 1000 545" xmlns="http://www.w3.org/2000/svg" font-family="'Bricolage Grotesque', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrowEnd" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#b9b2d6"/></marker>
    <marker id="arrowStart" markerWidth="10" markerHeight="10" refX="1" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8 Z" fill="#b9b2d6"/></marker>
  </defs>

  <!-- axis -->
  <text x="40" y="42" fill="#565072" font-size="15" font-weight="600">Bigger models / more intelligence</text>
  <text x="960" y="42" fill="#565072" font-size="15" font-weight="600" text-anchor="end">More speed</text>
  <line x1="44" y1="62" x2="956" y2="62" stroke="#b9b2d6" stroke-width="2" marker-start="url(#arrowStart)" marker-end="url(#arrowEnd)"/>

  <!-- Card 1: Mac Studio -->
  <rect x="35" y="92" width="300" height="372" rx="16" fill="#ffffff" stroke="#e3def4" stroke-width="1.5"/>
  <text x="57" y="134" fill="#5b4be0" font-size="23" font-weight="800">Mac Studio</text>
  <text x="57" y="158" fill="#8b86a1" font-size="13" font-weight="600">high memory, low bandwidth</text>
  <line x1="57" y1="174" x2="313" y2="174" stroke="#eee9fa" stroke-width="1.5"/>
  <text x="57" y="206" fill="#18161f" font-size="14.5">Runs massive models</text>
  <text x="57" y="232" fill="#18161f" font-size="14.5">GLM 5.2 roughly Opus 4.8 level</text>
  <text x="57" y="258" fill="#18161f" font-size="14.5">Slow (low bandwidth)</text>
  <text x="57" y="284" fill="#18161f" font-size="14.5">Best run passively, in</text>
  <text x="57" y="306" fill="#18161f" font-size="14.5">the background</text>
  <rect x="53" y="404" width="264" height="40" rx="10" fill="#ece9fb"/>
  <text x="185" y="430" fill="#5b4be0" font-size="14.5" font-weight="700" text-anchor="middle">Pick if: you want max smarts</text>

  <!-- Card 2: DGX Spark -->
  <rect x="350" y="92" width="300" height="372" rx="16" fill="#ffffff" stroke="#e3def4" stroke-width="1.5"/>
  <rect x="552" y="110" width="84" height="24" rx="12" fill="#9b59ff"/>
  <text x="594" y="126" fill="#ffffff" font-size="10.5" font-weight="700" text-anchor="middle" letter-spacing="0.5">SWEET SPOT</text>
  <text x="372" y="134" fill="#7c6cff" font-size="23" font-weight="800">DGX Spark</text>
  <text x="372" y="158" fill="#8b86a1" font-size="13" font-weight="600">balanced, easiest to set up</text>
  <line x1="372" y1="174" x2="628" y2="174" stroke="#eee9fa" stroke-width="1.5"/>
  <text x="372" y="206" fill="#18161f" font-size="14.5">~128GB unified memory</text>
  <text x="372" y="232" fill="#18161f" font-size="14.5">Decent speed (CUDA)</text>
  <text x="372" y="258" fill="#18161f" font-size="14.5">Medium models, side tasks</text>
  <text x="372" y="284" fill="#18161f" font-size="14.5">Plug in, the agent on your</text>
  <text x="372" y="306" fill="#18161f" font-size="14.5">main box sets it up</text>
  <rect x="368" y="404" width="264" height="40" rx="10" fill="#ebe7ff"/>
  <text x="500" y="430" fill="#7c6cff" font-size="14.5" font-weight="700" text-anchor="middle">Pick if: you want plug-and-play</text>

  <!-- Card 3: RTX 5090 -->
  <rect x="665" y="92" width="300" height="372" rx="16" fill="#ffffff" stroke="#e3def4" stroke-width="1.5"/>
  <text x="687" y="134" fill="#9b59ff" font-size="23" font-weight="800">RTX 5090</text>
  <text x="687" y="158" fill="#8b86a1" font-size="13" font-weight="600">high bandwidth, less VRAM</text>
  <line x1="687" y1="174" x2="943" y2="174" stroke="#eee9fa" stroke-width="1.5"/>
  <text x="687" y="206" fill="#18161f" font-size="14.5">32GB, or 96GB on the</text>
  <text x="687" y="228" fill="#18161f" font-size="14.5">6000 Pro (~$12k)</text>
  <text x="687" y="258" fill="#18161f" font-size="14.5">Qwen 3.6 roughly cloud speed</text>
  <text x="687" y="284" fill="#18161f" font-size="14.5">Insane speed, on demand.</text>
  <text x="687" y="306" fill="#18161f" font-size="14.5">Good for a local agent</text>
  <rect x="683" y="404" width="264" height="40" rx="10" fill="#f1e8ff"/>
  <text x="815" y="430" fill="#9b59ff" font-size="14.5" font-weight="700" text-anchor="middle">Pick if: you want cloud speed</text>

  <!-- caption -->
  <text x="500" y="512" fill="#8b86a1" font-size="13" text-anchor="middle">It all comes down to one trade-off: memory (model size) vs bandwidth (speed).</text>
  <text x="500" y="533" fill="#8b86a1" font-size="12.5" text-anchor="middle">Based on Alex Finn's 3-option local AI hardware breakdown.</text>
</svg>
