<svg viewBox="0 0 1000 470" xmlns="http://www.w3.org/2000/svg" font-family="'Bricolage Grotesque', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="tArrow" markerWidth="12" markerHeight="12" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#b9b2d6"/></marker>
  </defs>

  <text x="500" y="38" fill="#565072" font-size="16" font-weight="700" text-anchor="middle">Nvidia ships a new generation almost every year</text>

  <!-- timeline -->
  <line x1="70" y1="250" x2="940" y2="250" stroke="#b9b2d6" stroke-width="2.5" marker-end="url(#tArrow)"/>

  <!-- Node 1: Hopper 2022 -->
  <rect x="70" y="90" width="180" height="112" rx="14" fill="#ffffff" stroke="#e3def4" stroke-width="1.5"/>
  <text x="160" y="128" fill="#8b86a1" font-size="20" font-weight="800" text-anchor="middle">Hopper</text>
  <text x="160" y="154" fill="#18161f" font-size="13" text-anchor="middle">H100, the chip</text>
  <text x="160" y="174" fill="#18161f" font-size="13" text-anchor="middle">everyone wanted</text>
  <line x1="160" y1="202" x2="160" y2="241" stroke="#d8d2ee" stroke-width="1.5"/>
  <circle cx="160" cy="250" r="9" fill="#8b86a1" stroke="#ffffff" stroke-width="3"/>
  <text x="160" y="286" fill="#8b86a1" font-size="15" font-weight="700" text-anchor="middle">2022</text>

  <!-- Node 2: Blackwell 2024 -->
  <rect x="290" y="90" width="180" height="112" rx="14" fill="#ffffff" stroke="#e3def4" stroke-width="1.5"/>
  <text x="380" y="128" fill="#7c6cff" font-size="20" font-weight="800" text-anchor="middle">Blackwell</text>
  <text x="380" y="154" fill="#18161f" font-size="13" text-anchor="middle">Made Hopper</text>
  <text x="380" y="174" fill="#18161f" font-size="13" text-anchor="middle">feel old fast</text>
  <line x1="380" y1="202" x2="380" y2="241" stroke="#d8d2ee" stroke-width="1.5"/>
  <circle cx="380" cy="250" r="9" fill="#7c6cff" stroke="#ffffff" stroke-width="3"/>
  <text x="380" y="286" fill="#8b86a1" font-size="15" font-weight="700" text-anchor="middle">2024</text>

  <!-- Node 3: Rubin 2026 (now) -->
  <rect x="510" y="90" width="180" height="112" rx="14" fill="#ece9fb" stroke="#5b4be0" stroke-width="2"/>
  <rect x="566" y="70" width="68" height="22" rx="11" fill="#5b4be0"/>
  <text x="600" y="85" fill="#ffffff" font-size="10.5" font-weight="700" text-anchor="middle" letter-spacing="0.5">NOW</text>
  <text x="600" y="130" fill="#5b4be0" font-size="20" font-weight="800" text-anchor="middle">Rubin</text>
  <text x="600" y="156" fill="#18161f" font-size="13" text-anchor="middle">Current</text>
  <text x="600" y="176" fill="#18161f" font-size="13" text-anchor="middle">frontier</text>
  <line x1="600" y1="202" x2="600" y2="241" stroke="#c3b9f2" stroke-width="1.5"/>
  <circle cx="600" cy="250" r="10" fill="#5b4be0" stroke="#ffffff" stroke-width="3"/>
  <text x="600" y="286" fill="#5b4be0" font-size="15" font-weight="700" text-anchor="middle">2026</text>

  <!-- Node 4: Rubin Ultra 2027 (upcoming) -->
  <rect x="730" y="90" width="180" height="112" rx="14" fill="#ffffff" stroke="#9b59ff" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="820" y="128" fill="#9b59ff" font-size="19" font-weight="800" text-anchor="middle">Rubin Ultra</text>
  <text x="820" y="154" fill="#18161f" font-size="13" text-anchor="middle">Already on</text>
  <text x="820" y="174" fill="#18161f" font-size="13" text-anchor="middle">the roadmap</text>
  <line x1="820" y1="202" x2="820" y2="241" stroke="#d8d2ee" stroke-width="1.5"/>
  <circle cx="820" cy="250" r="9" fill="#ffffff" stroke="#9b59ff" stroke-width="3"/>
  <text x="820" y="286" fill="#8b86a1" font-size="15" font-weight="700" text-anchor="middle">2027</text>

  <!-- depreciation callout -->
  <rect x="70" y="322" width="860" height="84" rx="12" fill="#f3f1fb"/>
  <text x="500" y="354" fill="#18161f" font-size="14.5" text-anchor="middle">An H100 resold for about 45% of its new price by year three.</text>
  <text x="500" y="380" fill="#18161f" font-size="14.5" text-anchor="middle">Jensen Huang on Blackwell shipping: "you couldn't give Hoppers away."</text>

  <!-- takeaway -->
  <text x="500" y="444" fill="#5b4be0" font-size="15.5" font-weight="700" text-anchor="middle">What you pay a premium for today is mid-tier in about two years.</text>
</svg>
