<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link rel="preload" href="{{ '/assets/fonts/bricolage-grotesque-latin-700-normal.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  {% seo %}
</head>
<body>
  <div class="wrap">
    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <span>&copy; {{ site.time | date: "%Y" }} {{ site.author.name }}</span>
    </footer>
  </div>
</body>
</html>
